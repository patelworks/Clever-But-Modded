<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Tools Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
overflow:hidden;
}

/* GLASS STYLE */

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

/* LOGIN PAGE */

#loginPage{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#loginBox{
padding:40px;
text-align:center;
width:300px;
}

#loginBox input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

#loginBox button{
padding:10px 20px;
cursor:pointer;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
}

/* MAIN PAGE */

#mainPage{
display:none;
}

/* IFRAME */

iframe{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
border:none;
z-index:0;
}

/* SIDE BUTTONS */

.tool-btn{
position:fixed;
right:0;
padding:12px 10px;
writing-mode:vertical-rl;
cursor:pointer;
font-weight:bold;
border-radius:8px 0 0 8px;
z-index:10;
}

#calcBtn{top:35%;background:#2563eb}
#swBtn{top:45%;background:#7c3aed}
#timerBtn{top:55%;background:#f59e0b}
#notesBtn{top:65%;background:#10b981}
#musicBtn{top:75%;background:#e11d48}

/* TOOL WINDOWS */

.tool{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px;
width:260px;
display:none;
cursor:move;
z-index:20;
}

.close{
position:absolute;
right:10px;
top:5px;
cursor:pointer;
font-size:18px;
}

/* BUTTONS */

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#374151;
color:white;
margin:3px;
}

/* CALC */

#display{
width:100%;
height:40px;
margin-bottom:10px;
text-align:right;
font-size:18px;
}

/* NOTES */

#notes{
width:100%;
height:150px;
}

/* TIME TEXT */

.big{
font-size:26px;
text-align:center;
margin:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">
<div id="loginBox" class="glass">

<h2>Enter Password</h2>

<input type="password" id="passwordInput">

<button onclick="login()">Unlock</button>

<p id="loginMsg"></p>

</div>
</div>

<!-- MAIN APP -->

<div id="mainPage">

<iframe src="https://clever.com"></iframe>

<div id="calcBtn" class="tool-btn" onclick="toggle('calc')">CALC</div>
<div id="swBtn" class="tool-btn" onclick="toggle('sw')">STOPWATCH</div>
<div id="timerBtn" class="tool-btn" onclick="toggle('timer')">TIMER</div>
<div id="notesBtn" class="tool-btn" onclick="toggle('notesBox')">NOTES</div>
<div id="musicBtn" class="tool-btn" onclick="toggle('music')">MUSIC</div>

<!-- CALCULATOR -->

<div id="calc" class="tool glass">

<span class="close" onclick="toggle('calc')">✕</span>

<input id="display" disabled>

<div>
<button onclick="addCalc('7')">7</button>
<button onclick="addCalc('8')">8</button>
<button onclick="addCalc('9')">9</button>
<button onclick="addCalc('/')">/</button>

<button onclick="addCalc('4')">4</button>
<button onclick="addCalc('5')">5</button>
<button onclick="addCalc('6')">6</button>
<button onclick="addCalc('*')">*</button>

<button onclick="addCalc('1')">1</button>
<button onclick="addCalc('2')">2</button>
<button onclick="addCalc('3')">3</button>
<button onclick="addCalc('-')">-</button>

<button onclick="addCalc('0')">0</button>
<button onclick="addCalc('.')">.</button>
<button onclick="solveCalc()">=</button>
<button onclick="addCalc('+')">+</button>

<button onclick="clearCalc()">C</button>
</div>

</div>

<!-- STOPWATCH -->

<div id="sw" class="tool glass">

<span class="close" onclick="toggle('sw')">✕</span>

<div id="swTime" class="big">00:00</div>

<button onclick="startSW()">Start</button>
<button onclick="stopSW()">Stop</button>
<button onclick="resetSW()">Reset</button>

</div>

<!-- TIMER -->

<div id="timer" class="tool glass">

<span class="close" onclick="toggle('timer')">✕</span>

<input id="timerInput" placeholder="seconds">

<div id="timerTime" class="big">0</div>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

<!-- NOTES -->

<div id="notesBox" class="tool glass">

<span class="close" onclick="toggle('notesBox')">✕</span>

<textarea id="notes"></textarea>

</div>

<!-- MUSIC PLAYER -->

<div id="music" class="tool glass">

<span class="close" onclick="toggle('music')">✕</span>

<select id="songSelect" onchange="changeSong()">

<option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Song 1</option>
<option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Song 2</option>
<option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">Song 3</option>
<option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3">Song 4</option>
<option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3">Song 5</option>

</select>

<audio id="player" controls style="width:100%;margin-top:10px;">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

</div>

</div>

<script>

/* PASSWORDS */

const passwords=["icecream108","minionbrute9","grandma123"]

function login(){

let p=document.getElementById("passwordInput").value

if(passwords.includes(p)){

document.getElementById("loginPage").style.display="none"
document.getElementById("mainPage").style.display="block"

}else{

document.getElementById("loginMsg").innerText="Wrong password"

}

}

/* TOGGLE */

function toggle(id){

let el=document.getElementById(id)
el.style.display=(el.style.display==="block")?"none":"block"

}

/* DRAGGABLE */

document.querySelectorAll(".tool").forEach(el=>{

let offsetX,offsetY

el.onmousedown=e=>{

offsetX=e.clientX-el.offsetLeft
offsetY=e.clientY-el.offsetTop

document.onmousemove=e2=>{
el.style.left=e2.clientX-offsetX+"px"
el.style.top=e2.clientY-offsetY+"px"
}

document.onmouseup=()=>document.onmousemove=null

}

})

/* CALCULATOR */

const display=document.getElementById("display")

function addCalc(v){
display.value+=v
}

function clearCalc(){
display.value=""
}

function solveCalc(){
try{
display.value=eval(display.value)
}catch{
display.value="Error"
}
}

/* STOPWATCH */

let sw=0,swInt

function startSW(){
swInt=setInterval(()=>{sw++;updateSW()},1000)
}

function stopSW(){
clearInterval(swInt)
}

function resetSW(){
sw=0
updateSW()
}

function updateSW(){

let m=Math.floor(sw/60)
let s=sw%60

document.getElementById("swTime").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

}

/* TIMER */

let tInt

function startTimer(){

let t=parseInt(timerInput.value)

timerTime.innerText=t

tInt=setInterval(()=>{

t--
timerTime.innerText=t

if(t<=0){

clearInterval(tInt)

new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg").play()

}

},1000)

}

function resetTimer(){
clearInterval(tInt)
timerTime.innerText=0
}

/* NOTES AUTOSAVE */

let notes=document.getElementById("notes")

notes.value=localStorage.getItem("notes")||""

notes.oninput=()=>{
localStorage.setItem("notes",notes.value)
}

/* MUSIC CHANGE */

function changeSong(){
let player=document.getElementById("player")
let song=document.getElementById("songSelect").value
player.src=song
player.play()
}

</script>

</body>
</html>
